name: Workflow TP3

on:
  push:
    branches:
      - In-dev-TP3
      - main

  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias de front
        working-directory: front
        run: npm ci

      - name: Crear archivo .env
        working-directory: front
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" >> .env

      - name: Corre Lint
        working-directory: front
        run: npm run lint

      - name: Instalar dependencias de back
        working-directory: back
        run: npm ci

      - name: Correr Tests
        working-directory: back
        run: npm test

      - name: Instalar Playwright 
        working-directory: back
        run: npx playwright install

      - name: arrancar el Frontend
        working-directory: front
        run: npm run dev -- --host 0.0.0.0 &

      - name: Esperar a que el frontend esté listo
        run: |
          until curl -s http://localhost:5173 > /dev/null; do
            echo "Esperando frontend..."
            sleep 2
          done

      - name: correr E2E Tests
        working-directory: back
        run: npm run e2etest

      - name: Build Front
        working-directory: front
        run: npm run build

  deploy:
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar Vercel CLI
        run: npm install -g vercel

      - name: Descargar configuración de Vercel
        working-directory: front
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Construir proyecto
        working-directory: front
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy a producción
        working-directory: front
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}