name: Workflow TP3

on:
  push:
    branches:
      - In-dev-TP3
      - main

  pull_request:
    branches:
      - In-dev-TP3
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias de front
        working-directory: front
        run: npm ci

      - name: Corre Lint
        working-directory: front
        run: npm run lint

      - name: Instalar dependencias de back
        working-directory: back
        run: npm ci

      - name: Correr Tests
        working-directory: back
        run: npm test

      - name: Instalar Playwright 
        working-directory: back
        run: npx playwright install

      - name: arrancar el Frontend
        working-directory: front
        run: npm run dev -- --host 0.0.0.0 &

      - name: esperar al frontend
        run: sleep 10

      - name: correr E2E Tests
        working-directory: back
        run: npm run e2etest

      - name: Build Front
        working-directory: front
        run: npm run build